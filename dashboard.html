<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - MCA Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="./dashboard.html">MCA Master</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-links">
                    <!-- Nav links populated by app.js -->
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <div class="card shadow-sm p-4 text-center">
                        <h1 class="display-4">Welcome to MCA Master</h1>
                        <p class="lead">Your all-in-one preparation portal for MCA entrance exams.</p>
                        <hr class="my-4">
                        <div class="row mt-4">
                            <div class="col-md-6 mb-3">
                                <div class="card h-100 shadow-sm">
                                    <div class="card-body">
                                        <i class="bi bi-journal-text fs-1 text-primary"></i>
                                        <h5 class="card-title mt-3">Syllabus</h5>
                                        <p class="card-text">Check the detailed syllabus for your entrance exams.</p>
                                        <a href="./syllabus.html" class="btn btn-outline-primary">View Syllabus</a>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="card h-100 shadow-sm">
                                    <div class="card-body">
                                        <i class="bi bi-clock-history fs-1 text-success"></i>
                                        <h5 class="card-title mt-3">Study Time</h5>
                                        <p class="card-text">Access your study notes and preparation material.</p>
                                        <a href="./study_time.html" class="btn btn-outline-success">Go to Notes</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>
</body>

</html>
